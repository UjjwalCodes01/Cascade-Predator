services:
  # Python Skill Server (Web Service)
  - type: web
    name: cascade-skill-server
    env: python
    plan: free # Force the free tier
    rootDir: skill-server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: USE_VERTEX_AI
        value: "true"
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: GOOGLE_CLOUD_LOCATION
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false # Set this in Render dashboard by uploading your service-account.json as a Secret File
      - key: PRIVATE_KEY
        sync: false

  # TypeScript Agent (Free Web Service Hack)
  - type: web
    name: cascade-agent
    env: node
    plan: free # Force the free tier
    rootDir: agent
    buildCommand: npx --yes pnpm@latest install && npx pnpm run db:generate && npx pnpm run build
    startCommand: pnpm run paper
    envVars:
      - key: NODE_VERSION
        value: 20.14.0
      - key: DATABASE_URL
        sync: false
      - key: USE_VERTEX_AI
        value: "true"
      - key: GOOGLE_CLOUD_PROJECT
        sync: false
      - key: GOOGLE_CLOUD_LOCATION
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS
        sync: false # Set this in Render dashboard by uploading your service-account.json as a Secret File
      - key: PRIVATE_KEY
        sync: false
      - key: RPC_URL
        sync: false
      - key: SKILL_SERVER_URL
        sync: false
