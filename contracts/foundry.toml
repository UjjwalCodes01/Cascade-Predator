[profile.default]
src = "src"
out = "out"
libs = ["lib"]
optimizer = true
optimizer_runs = 200
solc_version = "0.8.20"
fs_permissions = [{ access = "read", path = "../" }]

[rpc_endpoints]
bsc = "https://bsc-dataseed.binance.org/"
bsc-testnet = "https://data-seed-prebsc-1-s1.binance.org:8545/"

[etherscan]
# Etherscan V2 unified gateway — supports BSC mainnet (56) and testnet (97) via chainid param
# Deprecated BscScan V1 (api-testnet.bscscan.com/api) is fully blocked as of June 2026.
# Verify manually: curl -X POST "https://api.etherscan.io/v2/api?chainid=97" ...
bsc = { key = "${BSCSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=56" }
bsc-testnet = { key = "${BSCSCAN_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=97" }
